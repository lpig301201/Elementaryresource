<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>環保戰士：淨化對決</title>
<style>
  :root {{
    --bg1:#6fd3ff;
    --bg2:#dff8ff;
    --leaf:#22c55e;
    --leaf2:#15803d;
    --danger:#ef4444;
    --danger2:#b91c1c;
    --ink:#12324a;
    --card:rgba(255,255,255,.92);
    --shadow:0 14px 30px rgba(18,50,74,.16);
    --gold:#fbbf24;
    --purple:#8b5cf6;
  }}
  * {{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }}
  html, body {{ margin:0; padding:0; overflow:hidden; font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; }}
  body {{
    background:linear-gradient(180deg,var(--bg1),var(--bg2) 52%, #97e07e 52%, #62c25a 100%);
    color:var(--ink);
  }}
  .app {{ height:100dvh; display:flex; flex-direction:column; }}
  .topbar {{
    position:relative; z-index:5;
    padding:10px 12px 8px;
    display:grid; grid-template-columns:1.4fr 1fr; gap:8px;
  }}
  .hero, .stats, .mission, .tipbox {{
    background:var(--card); border:2px solid rgba(255,255,255,.95);
    border-radius:22px; box-shadow:var(--shadow); backdrop-filter: blur(7px);
  }}
  .hero {{ padding:12px 14px; position:relative; overflow:hidden; }}
  .hero::after {{
    content:"🌍"; position:absolute; right:14px; top:10px; font-size:30px; opacity:.16;
  }}
  .title {{ font-size:24px; font-weight:900; line-height:1.1; }}
  .sub {{ font-size:12px; color:#45627c; margin-top:4px; line-height:1.4; }}
  .stats {{
    display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:8px;
  }}
  .stat {{
    background:rgba(255,255,255,.82); border-radius:16px; padding:8px 6px; text-align:center; font-weight:900;
  }}
  .stat .label {{ display:block; font-size:11px; color:#59728a; margin-bottom:2px; }}
  .stat .value {{ font-size:20px; }}
  .game {{
    position:relative; flex:1; overflow:hidden;
  }}
  .sun {{
    position:absolute; right:18px; top:20px; width:68px; height:68px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff7c8 0 24%, #ffd158 55%, #ffae22 100%);
    box-shadow:0 0 0 10px rgba(255,209,88,.18), 0 0 0 22px rgba(255,209,88,.08);
    animation:sun 4s ease-in-out infinite;
  }}
  @keyframes sun {{
    0%,100% {{ transform:scale(1); }}
    50% {{ transform:scale(1.05); }}
  }}
  .cloud {{
    position:absolute; background:rgba(255,255,255,.9); border-radius:999px;
    filter:drop-shadow(0 5px 10px rgba(255,255,255,.22));
  }}
  .cloud::before, .cloud::after {{
    content:""; position:absolute; background:rgba(255,255,255,.95); border-radius:50%;
  }}
  .c1 {{ left:30px; top:36px; width:90px; height:28px; }}
  .c1::before {{ width:34px; height:34px; left:10px; top:-14px; }}
  .c1::after {{ width:42px; height:42px; right:8px; top:-18px; }}
  .c2 {{ left:160px; top:74px; width:72px; height:22px; }}
  .c2::before {{ width:26px; height:26px; left:8px; top:-10px; }}
  .c2::after {{ width:32px; height:32px; right:8px; top:-14px; }}
  .mission {{
    position:absolute; left:12px; right:12px; top:10px; z-index:4;
    padding:10px 12px; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:center;
  }}
  .mission small {{ display:block; color:#5b748d; font-size:11px; font-weight:800; margin-bottom:4px; }}
  .mission b {{ font-size:22px; line-height:1.2; }}
  .mission .badge {{
    background:linear-gradient(135deg,#16a34a,#22c55e); color:#fff; font-weight:900; font-size:13px;
    border-radius:999px; padding:10px 14px; box-shadow:0 8px 18px rgba(34,197,94,.22);
  }}
  .tipbox {{
    position:absolute; left:12px; right:12px; top:96px; z-index:4; padding:9px 12px; font-size:13px; line-height:1.5;
  }}
  .lane {{
    position:absolute; left:0; right:0; height:112px; border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.14));
    border-top:2px dashed rgba(255,255,255,.55); border-bottom:2px dashed rgba(255,255,255,.3);
  }}
  .lane.top {{ top:38%; }}
  .lane.bottom {{ top:62%; }}
  .grass {{ position:absolute; left:0; right:0; bottom:112px; height:30px; background:linear-gradient(180deg,#92df73,#54b455); }}
  .ground {{ position:absolute; left:0; right:0; bottom:0; height:112px; background:linear-gradient(180deg,#876048,#634331); }}
  .hero-figure {{
    position:absolute; left:16px; bottom:66px; z-index:2; font-size:56px; filter:drop-shadow(0 8px 14px rgba(0,0,0,.15));
  }}
  .combo-burst {{
    position:absolute; right:16px; bottom:84px; z-index:2; background:rgba(255,255,255,.88);
    border-radius:20px; padding:10px 12px; font-weight:900; box-shadow:var(--shadow);
  }}
  .answer {{
    position:absolute; width:min(42vw, 240px); min-height:94px; z-index:6; cursor:pointer; user-select:none;
    border-radius:24px; box-shadow:0 16px 28px rgba(17,24,39,.18);
    border:3px solid rgba(255,255,255,.96); overflow:hidden;
    transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
  }}
  .answer:hover, .answer:active {{ transform:scale(1.02); }}
  .answer.correct {{
    background:linear-gradient(180deg,#43d96a,#1fa54e); color:white;
  }}
  .answer.wrong {{
    background:linear-gradient(180deg,#ff7c7c,#e04141); color:white;
  }}
  .answer .head {{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px 6px; font-size:13px; font-weight:900;
    background:rgba(255,255,255,.14);
  }}
  .answer .body {{
    padding:10px 14px 12px; font-size:22px; font-weight:900; line-height:1.22; text-align:center;
    display:flex; min-height:60px; align-items:center; justify-content:center;
  }}
  .answer .tag {{
    display:inline-flex; align-items:center; gap:6px;
    border-radius:999px; padding:5px 8px; background:rgba(255,255,255,.18); font-size:12px;
  }}
  .answer .mark {{ font-size:22px; }}
  .pop {{
    position:absolute; left:50%; top:48%; z-index:20; transform:translate(-50%,-50%);
    font-size:34px; font-weight:900; pointer-events:none; text-shadow:0 6px 14px rgba(255,255,255,.72);
    animation:pop .75s ease forwards;
  }}
  @keyframes pop {{
    0% {{ opacity:0; transform:translate(-50%,-20%) scale(.76); }}
    20% {{ opacity:1; }}
    100% {{ opacity:0; transform:translate(-50%,-120%) scale(1.15); }}
  }}
  .overlay {{
    position:absolute; inset:0; z-index:30; background:rgba(16,39,58,.34);
    display:flex; align-items:center; justify-content:center; padding:18px;
  }}
  .card {{
    width:min(620px,100%); background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,251,255,.94));
    border-radius:28px; padding:24px 18px; text-align:center; box-shadow:0 24px 50px rgba(0,0,0,.22);
  }}
  .card h1, .card h2 {{ margin:0 0 8px; line-height:1.15; }}
  .card p {{ margin:8px 0; line-height:1.7; color:#35516d; }}
  .btn {{
    appearance:none; border:none; cursor:pointer; font-weight:900; color:#fff; font-size:22px;
    border-radius:18px; padding:14px 18px; margin-top:10px;
    background:linear-gradient(135deg,#22c55e,#15803d); box-shadow:0 12px 24px rgba(34,197,94,.24);
  }}
  .btn.secondary {{ background:linear-gradient(135deg,#60a5fa,#2563eb); }}
  .sound-toggle {{
    position:absolute; right:12px; top:12px; z-index:10; background:rgba(255,255,255,.92); border:none; border-radius:999px;
    padding:8px 12px; font-weight:900; box-shadow:var(--shadow);
  }}
  .shake {{ animation:shake .25s linear 1; }}
  @keyframes shake {{
    0%,100% {{ transform:translateX(0); }}
    25% {{ transform:translateX(-6px); }}
    75% {{ transform:translateX(6px); }}
  }}
  .hidden {{ display:none !important; }}

  @media (max-width:768px) {{
    .topbar {{ grid-template-columns:1fr; }}
    .title {{ font-size:20px; }}
    .sub {{ font-size:11px; padding-right:28px; }}
    .mission {{ top:8px; grid-template-columns:1fr; }}
    .mission b {{ font-size:18px; }}
    .mission .badge {{ text-align:center; }}
    .tipbox {{ top:116px; font-size:12px; }}
    .lane.top {{ top:41%; }}
    .lane.bottom {{ top:64%; }}
    .answer {{ width:min(44vw, 200px); min-height:88px; border-radius:20px; }}
    .answer .body {{ font-size:18px; padding:8px 10px 10px; }}
    .answer .head {{ font-size:12px; padding:7px 10px 5px; }}
    .hero-figure {{ font-size:46px; left:10px; }}
    .combo-burst {{ right:10px; bottom:92px; padding:8px 10px; }}
    .ground {{ height:98px; }}
    .grass {{ bottom:98px; }}
  }}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hero">
      <div class="title">🌍 環保戰士：淨化對決</div>
      <div class="sub">用你上傳的 Excel 題庫出題｜2選項對決｜0.3倍慢速版｜答對累積連擊與分數</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="label">⏱ 剩餘時間</span><span id="timeText" class="value">40</span></div>
      <div class="stat"><span class="label">⭐ 目前分數</span><span id="scoreText" class="value">0</span></div>
      <div class="stat"><span class="label">🔥 連擊數</span><span id="comboText" class="value">0</span></div>
    </div>
  </div>

  <div id="gameArea" class="game">
    <button id="soundBtn" class="sound-toggle" type="button">🔊 音效：開</button>
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div class="mission">
      <div>
        <small>🎯 本回合題目</small>
        <b id="missionText">準備開始</b>
      </div>
      <div class="badge" id="categoryBadge">題庫讀取完成</div>
    </div>

    <div class="tipbox" id="tipText">兩張卡片會慢慢移動，直接點選你認為正確的答案。答對可累積連擊，答錯會中斷連擊。</div>

    <div class="lane top"></div>
    <div class="lane bottom"></div>

    <div class="hero-figure">🦸♻️</div>
    <div class="combo-burst" id="comboBurst">連擊待命</div>

    <div class="grass"></div>
    <div class="ground"></div>

    <div class="overlay" id="startOverlay">
      <div class="card">
        <h1>✨ 淨化試煉開始前</h1>
        <p>這一版已經改成直接使用你上傳的 <b>questions.xlsx</b> 當題庫。</p>
        <p>每題只會出現 <b>2 個選項</b>：一個正確、一個錯誤，讓畫面更緊湊也更好辨識。</p>
        <p>你只要點擊正確答案，40 秒內盡量衝高分就行！</p>
        <button id="startBtn" class="btn" type="button">開始挑戰</button>
      </div>
    </div>

    <div class="overlay hidden" id="resultOverlay">
      <div class="card">
        <h2 id="resultTitle">挑戰完成</h2>
        <p id="resultDesc"></p>
        <button id="restartBtn" class="btn secondary" type="button">再玩一次</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"category": "瓦斯罐", "question": "瓦斯罐丟棄前需？", "options": [{"key": "A", "text": "直接丟"}, {"key": "B", "text": "排空氣體"}, {"key": "C", "text": "加水"}], "answer": "B", "explain": "避免爆炸"}, {"category": "鋰電池", "question": "用過的行動電源應如何處理？", "options": [{"key": "A", "text": "一般垃圾"}, {"key": "B", "text": "資源回收車"}, {"key": "C", "text": "專門回收點"}], "answer": "C", "explain": "鋰電池易起火需專門回收"}, {"category": "概念", "question": "回收可節省能源嗎？", "options": [{"key": "A", "text": "可以"}, {"key": "B", "text": "不可以"}], "answer": "A", "explain": "減少開採"}, {"category": "概念", "question": "回收的目的是？", "options": [{"key": "A", "text": "減少污染"}, {"key": "B", "text": "增加垃圾"}, {"key": "C", "text": "沒差"}], "answer": "A", "explain": "環保核心"}, {"category": "概念", "question": "回收需分類嗎？", "options": [{"key": "A", "text": "需要"}, {"key": "B", "text": "不需要"}], "answer": "A", "explain": "提升效率"}, {"category": "油漆罐", "question": "油漆罐應如何處理？", "options": [{"key": "A", "text": "回收"}, {"key": "B", "text": "倒掉"}, {"key": "C", "text": "垃圾"}], "answer": "A", "explain": "特殊處理"}, {"category": "概念", "question": "玻璃瓶回收前需？（延伸題12）", "options": [{"key": "A", "text": "打破"}, {"key": "B", "text": "清空內容物"}, {"key": "C", "text": "裝水"}], "answer": "B", "explain": "避免污染"}, {"category": "分類", "question": "玻璃應如何丟棄？", "options": [{"key": "A", "text": "包好"}, {"key": "B", "text": "直接丟"}, {"key": "C", "text": "丟河"}], "answer": "A", "explain": "避免受傷"}, {"category": "整理", "question": "紙箱回收前需？", "options": [{"key": "A", "text": "折疊"}, {"key": "B", "text": "整箱丟"}, {"key": "C", "text": "泡水"}], "answer": "A", "explain": "節省空間"}, {"category": "分類", "question": "紙餐盒應如何處理？", "options": [{"key": "A", "text": "回收"}, {"key": "B", "text": "一般垃圾"}, {"key": "C", "text": "廚餘"}], "answer": "B", "explain": "沾油不可回收"}, {"category": "概念", "question": "紙類回收前需要？（延伸題17）", "options": [{"key": "A", "text": "清洗"}, {"key": "B", "text": "壓平"}, {"key": "C", "text": "燒掉"}], "answer": "B", "explain": "方便回收"}, {"category": "概念", "question": "減塑方式？", "options": [{"key": "A", "text": "重複使用"}, {"key": "B", "text": "丟掉"}, {"key": "C", "text": "焚燒"}], "answer": "A", "explain": "減量"}, {"category": "概念", "question": "塑膠瓶應該丟到哪一類？（延伸題1）", "options": [{"key": "A", "text": "一般垃圾"}, {"key": "B", "text": "資源回收"}, {"key": "C", "text": "廚餘"}], "answer": "B", "explain": "可再利用"}, {"category": "分類", "question": "塑膠袋乾淨可？", "options": [{"key": "A", "text": "回收"}, {"key": "B", "text": "垃圾"}, {"key": "C", "text": "廚餘"}], "answer": "A", "explain": "視情況"}, {"category": "滅火器", "question": "滅火器應如何處理？", "options": [{"key": "A", "text": "垃圾"}, {"key": "B", "text": "合格消防器材商"}, {"key": "C", "text": "丟河"}], "answer": "B", "explain": "高壓容器"}, {"category": "農藥罐", "question": "農藥罐應如何回收？", "options": [{"key": "A", "text": "清洗後回收"}, {"key": "B", "text": "直接丟"}, {"key": "C", "text": "埋土"}], "answer": "A", "explain": "避免污染"}, {"category": "鋰電池", "question": "電池可以丟一般垃圾嗎？", "options": [{"key": "A", "text": "可以"}, {"key": "B", "text": "不可以"}], "answer": "B", "explain": "易引發火災"}, {"category": "管道", "question": "電池回收點在哪？", "options": [{"key": "A", "text": "超商"}, {"key": "B", "text": "餐廳"}, {"key": "C", "text": "公園"}], "answer": "A", "explain": "常見設點"}, {"category": "電池", "question": "電池應回收於？", "options": [{"key": "A", "text": "超商"}, {"key": "B", "text": "一般垃圾車"}, {"key": "C", "text": "水溝"}], "answer": "A", "explain": "設有回收點"}, {"category": "噴霧罐", "question": "噴霧罐回收前需？", "options": [{"key": "A", "text": "排空交回收車"}, {"key": "B", "text": "直接丟"}, {"key": "C", "text": "加熱"}], "answer": "A", "explain": "避免爆炸"}, {"category": "概念", "question": "廚餘可以做什麼？（延伸題14）", "options": [{"key": "A", "text": "焚化"}, {"key": "B", "text": "堆肥"}, {"key": "C", "text": "掩埋"}], "answer": "B", "explain": "可製成肥料"}, {"category": "分類", "question": "廚餘應？", "options": [{"key": "A", "text": "廚餘桶"}, {"key": "B", "text": "回收"}, {"key": "C", "text": "垃圾"}], "answer": "A", "explain": "分類處理"}, {"category": "燈管", "question": "廢燈管應如何處理？", "options": [{"key": "A", "text": "垃圾"}, {"key": "B", "text": "防破包裝交回收車"}, {"key": "C", "text": "打破丟"}], "answer": "B", "explain": "含汞有毒"}, {"category": "分類", "question": "鋁罐應？", "options": [{"key": "A", "text": "回收"}, {"key": "B", "text": "垃圾"}, {"key": "C", "text": "廚餘"}], "answer": "A", "explain": "可再利用"}, {"category": "3C", "question": "舊手機應如何處理？", "options": [{"key": "A", "text": "回收"}, {"key": "B", "text": "垃圾"}, {"key": "C", "text": "焚燒"}], "answer": "A", "explain": "含重金屬"}, {"category": "清潔", "question": "寶特瓶回收前需？", "options": [{"key": "A", "text": "清洗壓扁"}, {"key": "B", "text": "直接丟"}, {"key": "C", "text": "剪碎"}], "answer": "A", "explain": "提升回收品質"}];
const GAME = {{
  duration: 40,
  speed: 1.2,
  activePair: [],
  pairCleared: false,
  running: false,
  score: 0,
  combo: 0,
  timeLeft: 40,
  rafId: null,
  timerId: null,
  soundOn: true,
  audioCtx: null,
  usedOrder: []
}};

const els = {{
  gameArea: document.getElementById('gameArea'),
  missionText: document.getElementById('missionText'),
  categoryBadge: document.getElementById('categoryBadge'),
  tipText: document.getElementById('tipText'),
  timeText: document.getElementById('timeText'),
  scoreText: document.getElementById('scoreText'),
  comboText: document.getElementById('comboText'),
  comboBurst: document.getElementById('comboBurst'),
  startOverlay: document.getElementById('startOverlay'),
  resultOverlay: document.getElementById('resultOverlay'),
  resultTitle: document.getElementById('resultTitle'),
  resultDesc: document.getElementById('resultDesc'),
  startBtn: document.getElementById('startBtn'),
  restartBtn: document.getElementById('restartBtn'),
  soundBtn: document.getElementById('soundBtn')
}};

function shuffle(arr) {{
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {{
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }}
  return copy;
}}

function nextQuestion() {{
  if (GAME.usedOrder.length === 0) GAME.usedOrder = shuffle(QUESTIONS);
  return GAME.usedOrder.pop();
}}

function pickTwoOptions(question) {{
  const correct = question.options.find(o => o.key === question.answer);
  const wrongPool = question.options.filter(o => o.key !== question.answer);
  const wrong = wrongPool[Math.floor(Math.random() * wrongPool.length)];
  return shuffle([
    {{ ...correct, isCorrect: true }},
    {{ ...wrong, isCorrect: false }}
  ]);
}}

function tone(freq, duration, type='sine', gain=0.04) {{
  if (!GAME.soundOn) return;
  try {{
    if (!GAME.audioCtx) GAME.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = GAME.audioCtx;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    amp.gain.value = gain;
    osc.connect(amp);
    amp.connect(ctx.destination);
    osc.start();
    amp.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  }} catch (e) {{}}
}}

function playCorrect() {{
  tone(660, .12, 'triangle', 0.05);
  setTimeout(() => tone(880, .18, 'triangle', 0.045), 70);
}}

function playWrong() {{
  tone(220, .18, 'sawtooth', 0.045);
  setTimeout(() => tone(160, .22, 'sawtooth', 0.04), 80);
}}

function playCombo() {{
  tone(720, .08, 'square', 0.03);
  setTimeout(() => tone(920, .12, 'square', 0.025), 60);
}}

function updateHud() {{
  els.timeText.textContent = GAME.timeLeft;
  els.scoreText.textContent = GAME.score;
  els.comboText.textContent = GAME.combo;
  if (GAME.combo >= 10) {{
    els.comboBurst.textContent = '🌈 環保覺醒 x' + GAME.combo;
  }} else if (GAME.combo >= 5) {{
    els.comboBurst.textContent = '⚡ 高速連擊 x' + GAME.combo;
  }} else if (GAME.combo >= 2) {{
    els.comboBurst.textContent = '🔥 連擊中 x' + GAME.combo;
  }} else {{
    els.comboBurst.textContent = '連擊待命';
  }}
}}

function pop(text, good=true) {{
  const div = document.createElement('div');
  div.className = 'pop';
  div.textContent = text;
  div.style.color = good ? '#16a34a' : '#b91c1c';
  els.gameArea.appendChild(div);
  setTimeout(() => div.remove(), 740);
}}

function clearActivePair() {{
  GAME.activePair.forEach(item => {{
    if (item && item.el && item.el.parentNode) item.el.remove();
  }});
  GAME.activePair = [];
}}

function answerQuestion(choice, question) {{
  if (!GAME.running || GAME.pairCleared) return;
  GAME.pairCleared = true;

  if (choice.isCorrect) {{
    GAME.score += 10;
    GAME.combo += 1;
    pop('✨ 淨化成功', true);
    els.tipText.textContent = '答對了！' + (question.explain ? ' ' + question.explain : '繼續守護地球！');
    playCorrect();
    if (GAME.combo === 2 || GAME.combo === 5 || GAME.combo === 10) playCombo();
  }} else {{
    GAME.combo = 0;
    pop('💀 污染擴散', false);
    const answerText = question.options.find(o => o.key === question.answer).text;
    els.tipText.textContent = '這題正解是：' + answerText + '。' + (question.explain ? question.explain : '');
    els.gameArea.classList.add('shake');
    setTimeout(() => els.gameArea.classList.remove('shake'), 250);
    playWrong();
  }}
  updateHud();
  clearActivePair();
  if (GAME.running) setTimeout(spawnQuestion, 350);
}}

function createCard(choice, laneTop, question, xStart) {{
  const el = document.createElement('button');
  el.type = 'button';
  el.className = 'answer ' + (choice.isCorrect ? 'correct' : 'wrong');
  el.innerHTML = `
    <div class="head">
      <span class="tag">${{choice.isCorrect ? '✨ 淨化目標' : '👾 污染怪物'}}</span>
      <span class="mark">${{choice.isCorrect ? '✔️' : '❌'}}</span>
    </div>
    <div class="body">${{choice.text}}</div>
  `;
  el.style.left = xStart + 'px';
  el.style.top = laneTop + 'px';
  el.addEventListener('click', () => answerQuestion(choice, question), {{ passive:true }});
  els.gameArea.appendChild(el);
  return {{
    el,
    x: xStart,
    y: laneTop,
    width: Math.min(window.innerWidth * 0.42, 240)
  }};
}}

function spawnQuestion() {{
  if (!GAME.running) return;
  GAME.pairCleared = false;
  clearActivePair();

  const question = nextQuestion();
  const choices = pickTwoOptions(question);

  els.missionText.textContent = question.question;
  els.categoryBadge.textContent = '📚 題庫分類：' + (question.category || '一般題');
  els.tipText.textContent = '請直接點選正確答案卡。這題來自你上傳的 Excel 題庫。';

  const xStart = window.innerWidth + 10;
  const laneYs = [window.innerHeight * 0.37, window.innerHeight * 0.61];
  const shuffledY = Math.random() > 0.5 ? laneYs : [laneYs[1], laneYs[0]];

  GAME.activePair = [
    createCard(choices[0], shuffledY[0], question, xStart),
    createCard(choices[1], shuffledY[1], question, xStart + 16)
  ];
}}

function loop() {{
  if (!GAME.running) return;
  let offscreenCount = 0;

  GAME.activePair.forEach(item => {{
    if (!item || !item.el) return;
    item.x -= GAME.speed;
    item.el.style.left = item.x + 'px';
    if (item.x < -item.width - 20) offscreenCount += 1;
  }});

  if (GAME.activePair.length && offscreenCount === GAME.activePair.length && !GAME.pairCleared) {{
    GAME.combo = 0;
    updateHud();
    els.tipText.textContent = '這題錯過了，連擊中斷。下一題來了！';
    GAME.pairCleared = true;
    clearActivePair();
    setTimeout(spawnQuestion, 350);
  }}

  GAME.rafId = requestAnimationFrame(loop);
}}

function endGame() {{
  GAME.running = false;
  clearInterval(GAME.timerId);
  cancelAnimationFrame(GAME.rafId);
  clearActivePair();

  els.resultTitle.textContent = GAME.score >= 100 ? '🎉 任務成功！' : '💪 再試一次！';
  els.resultDesc.textContent = `你這次拿到 ${{GAME.score}} 分。這一版的題目全部來自你上傳的 questions.xlsx。`;
  els.resultOverlay.classList.remove('hidden');
}}

function startGame() {{
  GAME.running = true;
  GAME.score = 0;
  GAME.combo = 0;
  GAME.timeLeft = GAME.duration;
  GAME.usedOrder = shuffle(QUESTIONS);
  GAME.pairCleared = false;
  updateHud();
  els.startOverlay.classList.add('hidden');
  els.resultOverlay.classList.add('hidden');
  spawnQuestion();
  loop();
  clearInterval(GAME.timerId);
  GAME.timerId = setInterval(() => {{
    GAME.timeLeft -= 1;
    updateHud();
    if (GAME.timeLeft <= 0) endGame();
  }}, 1000);
}}

els.startBtn.addEventListener('click', startGame);
els.restartBtn.addEventListener('click', startGame);
els.soundBtn.addEventListener('click', () => {{
  GAME.soundOn = !GAME.soundOn;
  els.soundBtn.textContent = GAME.soundOn ? '🔊 音效：開' : '🔈 音效：關';
}});
updateHud();
</script>
</body>
</html>
