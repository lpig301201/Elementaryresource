<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>垃圾分類小英雄</title>
  <style>
    :root {
      --sky1:#8ddcff;
      --sky2:#eaf9ff;
      --grass1:#94d96a;
      --grass2:#5fbf5d;
      --soil1:#856048;
      --soil2:#5b4030;
      --card:rgba(255,255,255,.88);
      --line:rgba(255,255,255,.9);
      --text:#19324d;
      --muted:#4f6b86;
      --green:#1f9d55;
      --orange:#f97316;
      --blue:#2563eb;
      --red:#ef4444;
      --shadow:0 14px 34px rgba(20,50,80,.16);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body {
      margin:0; padding:0; overflow:hidden;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--sky1),var(--sky2));
    }
    body { min-height:100dvh; }
    .app { min-height:100dvh; display:flex; flex-direction:column; }
    .topbar {
      position:relative; z-index:5;
      display:grid; grid-template-columns: minmax(0,1.1fr) auto;
      gap:12px; padding:12px 14px 10px;
    }
    .hero-card, .score-wrap > div, .info-card, .mission-card {
      background:var(--card);
      border:2px solid rgba(255,255,255,.95);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(6px);
    }
    .hero-card {
      padding:12px 16px;
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.82));
    }
    .hero-title { font-weight:900; font-size:24px; line-height:1.1; }
    .hero-sub { margin-top:5px; font-size:13px; color:var(--muted); line-height:1.45; }
    .score-wrap { display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; justify-content:flex-end; }
    .score-wrap > div {
      padding:10px 12px; font-weight:900; font-size:15px; min-width:92px; text-align:center;
    }

    .game {
      position:relative; flex:1; min-height:0; overflow:hidden;
    }
    .sky {
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 12% 15%, rgba(255,255,255,.95) 0 26px, transparent 27px),
        radial-gradient(circle at 20% 16%, rgba(255,255,255,.8) 0 18px, transparent 19px),
        radial-gradient(circle at 72% 14%, rgba(255,255,255,.95) 0 28px, transparent 29px),
        radial-gradient(circle at 80% 16%, rgba(255,255,255,.8) 0 18px, transparent 19px),
        linear-gradient(180deg, #82d7ff 0%, #c7f0ff 42%, #b5e88f 43%, #78d06a 100%);
    }
    .sun {
      position:absolute; right:18px; top:22px; width:78px; height:78px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff7cc 0 20%, #ffd76a 45%, #ffbf3a 100%);
      box-shadow:0 0 0 10px rgba(255,215,106,.18), 0 0 0 20px rgba(255,215,106,.1);
    }
    .mission-card {
      position:absolute; left:14px; right:14px; top:10px; z-index:4;
      display:grid; grid-template-columns: minmax(0,1fr) auto; gap:12px; align-items:center;
      padding:12px 16px;
    }
    .mission-card small { display:block; color:var(--muted); font-weight:700; margin-bottom:4px; }
    .mission-card b { font-size:28px; }
    .mission-tip {
      border-radius:999px; padding:10px 14px; font-weight:900; color:#fff;
      background:linear-gradient(135deg,#36b36f,#1f9d55);
      box-shadow:0 8px 18px rgba(31,157,85,.25);
      white-space:nowrap;
    }
    .info-card {
      position:absolute; left:14px; top:110px; z-index:4;
      width:min(370px, calc(100vw - 28px));
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(245,251,255,.9));
    }
    .info-head { display:flex; align-items:center; gap:8px; font-weight:900; font-size:18px; }
    .tag {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px; border-radius:999px; font-size:13px; font-weight:900; color:#fff;
      background:linear-gradient(135deg,#3ba0ff,#2563eb);
      margin:10px 0 8px;
    }
    .item-name { font-size:22px; font-weight:900; margin:0 0 6px; }
    .item-desc { font-size:15px; line-height:1.7; color:#2b4966; min-height:72px; }
    .item-note { font-size:13px; color:#5d7690; margin-top:6px; }

    .ground {
      position:absolute; left:0; right:0; bottom:92px; height:180px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), transparent 18px),
        linear-gradient(180deg, var(--soil1), var(--soil2));
      border-top:5px solid rgba(255,255,255,.6);
      box-shadow: inset 0 18px 24px rgba(255,255,255,.08);
    }
    .grass {
      position:absolute; left:0; right:0; bottom:248px; height:36px;
      background:linear-gradient(180deg,var(--grass1),var(--grass2));
      border-top:3px solid rgba(255,255,255,.4);
    }
    .hit-zone {
      position:absolute; left:50%; transform:translateX(-50%);
      bottom:92px; width:118px; height:180px; z-index:2;
      border-left:4px dashed rgba(255,255,255,.95);
      border-right:4px dashed rgba(255,255,255,.95);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.12));
    }
    .zone-label {
      position:absolute; left:50%; transform:translateX(-50%);
      bottom:280px; z-index:4;
      padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.92);
      font-weight:900; font-size:14px; box-shadow:var(--shadow);
    }

    .hero {
      position:absolute; left:50%; transform:translateX(-50%);
      bottom:110px; width:88px; height:120px; z-index:3;
      filter:drop-shadow(0 10px 10px rgba(0,0,0,.15));
    }
    .hero .head {
      width:42px; height:42px; border-radius:50%; margin:0 auto;
      background:#ffd9b8; border:2px solid rgba(0,0,0,.08);
    }
    .hero .helmet {
      width:52px; height:18px; background:#22c55e; border-radius:14px 14px 8px 8px; margin:-2px auto 0;
    }
    .hero .body {
      width:54px; height:40px; background:linear-gradient(180deg,#31a6ff,#2563eb);
      border-radius:16px 16px 12px 12px; margin:2px auto 0; position:relative;
    }
    .hero .logo {
      position:absolute; left:50%; top:9px; transform:translateX(-50%);
      font-size:18px;
    }
    .hero .arm {
      position:absolute; top:50px; width:18px; height:10px; background:#ffd9b8; border-radius:10px;
    }
    .hero .arm.left { left:8px; }
    .hero .arm.right { right:8px; transform-origin:left center; }
    .hero .tool {
      position:absolute; right:-3px; top:45px; font-size:22px; transform-origin:left center;
    }
    .hero .legs { display:flex; justify-content:center; gap:10px; margin-top:3px; }
    .hero .leg { width:12px; height:30px; border-radius:10px; background:#475569; }
    .hero.attack .arm.right, .hero.attack .tool {
      animation:punch .18s ease-out 1;
    }
    @keyframes punch {
      0% { transform:rotate(0deg) translateX(0); }
      50% { transform:rotate(-36deg) translateX(8px); }
      100% { transform:rotate(0deg) translateX(0); }
    }

    .item {
      position:absolute; bottom:122px; min-width:88px; max-width:108px; min-height:84px;
      padding:10px 8px 8px; z-index:2;
      display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(246,251,255,.88));
      border:2px solid rgba(255,255,255,.98);
      box-shadow:0 16px 26px rgba(0,0,0,.12);
    }
    .item .emoji { font-size:30px; line-height:1; }
    .item .name { margin-top:6px; font-size:15px; font-weight:900; line-height:1.15; word-break:break-word; }
    .item.good { outline:4px solid rgba(31,157,85,.35); transform:scale(1.05); }
    .item.bad { outline:4px solid rgba(239,68,68,.25); }

    .fx {
      position:absolute; z-index:10; pointer-events:none; font-weight:900; font-size:34px;
      text-shadow:0 4px 10px rgba(255,255,255,.85);
      animation:floatUp .75s ease-out forwards;
    }
    @keyframes floatUp {
      0% { transform:translate(-50%, 0) scale(.75); opacity:0; }
      18% { opacity:1; }
      100% { transform:translate(-50%, -68px) scale(1.08); opacity:0; }
    }

    .controls {
      position:relative; z-index:5; padding:12px 14px calc(16px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.5));
      backdrop-filter: blur(8px);
      display:grid; grid-template-columns:1fr;
    }
    button {
      appearance:none; border:none; border-radius:22px; padding:18px 16px;
      color:#fff; font-size:24px; font-weight:900; letter-spacing:.5px;
      background:linear-gradient(135deg,#ff9c3f,#f97316);
      box-shadow:0 16px 26px rgba(249,115,22,.25);
    }

    .overlay {
      position:absolute; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
      background:rgba(18,40,67,.3); padding:18px;
    }
    .card {
      width:min(560px,100%); background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(245,250,255,.95));
      border-radius:30px; padding:24px 20px; text-align:center; box-shadow:0 26px 60px rgba(0,0,0,.22);
    }
    .card h1,.card h2 { margin:0 0 10px; line-height:1.15; }
    .card p { margin:8px 0; line-height:1.75; color:#35516d; }
    .big-btn, .sec-btn {
      display:inline-block; text-decoration:none; color:#fff; font-weight:900;
      border-radius:18px; padding:14px 18px; margin-top:10px;
    }
    .big-btn { background:linear-gradient(135deg,#2aba65,#1f9d55); box-shadow:0 12px 24px rgba(31,157,85,.22); }
    .sec-btn { background:linear-gradient(135deg,#3d93ff,#2563eb); }
    .qr {
      width:220px; max-width:70vw; aspect-ratio:1; object-fit:contain;
      border-radius:18px; background:white; border:1px solid #d6e2ee; margin:14px auto 0;
    }
    .hidden { display:none !important; }

    .debug {
      position:absolute; right:10px; top:92px; z-index:8; background:rgba(17,24,39,.75); color:#fff;
      border-radius:14px; padding:8px 10px; font-size:12px; line-height:1.55;
    }

    @media (max-width: 640px) {
      .topbar { grid-template-columns:1fr; }
      .score-wrap { justify-content:flex-start; }
      .hero-title { font-size:22px; }
      .mission-card { top:80px; }
      .mission-card b { font-size:23px; }
      .mission-tip { font-size:13px; padding:9px 12px; }
      .info-card { top:154px; width:min(320px, calc(100vw - 28px)); padding:12px 14px; }
      .item-name { font-size:20px; }
      .item-desc { font-size:14px; min-height:88px; }
      .debug { top:246px; }
      .ground { height:170px; }
      .grass { bottom:238px; }
      .hit-zone { height:170px; }
      .zone-label { bottom:266px; font-size:13px; }
      .hero { bottom:108px; }
      .item { min-width:80px; max-width:96px; min-height:78px; }
      button { font-size:22px; padding:17px 14px; }
    }

    @media (max-width: 820px) {
      body {
        align-items: flex-start;
        padding: 8px;
      }
      .game-shell {
        width: 100%;
        max-width: 100%;
        border-radius: 18px;
      }
      .hud {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
      }
      .hud-card {
        min-width: 0;
      }
      .game-area {
        height: min(56vh, 460px);
      }
      .top-left-panel {
        top: 8px;
        left: 8px;
        width: min(260px, calc(100vw - 16px));
      }
      .info-card {
        padding: 10px 12px;
        border-radius: 14px;
      }
      .info-card h3 {
        font-size: 15px;
      }
      .info-card p,
      .info-card .mini {
        font-size: 12px;
      }
      .character {
        width: 70px;
        height: 92px;
        left: 15%;
      }
      .lane-mark {
        left: 36%;
        width: 84px;
      }
      .controls {
        padding: 10px 12px 14px;
      }
      .control-row {
        flex-wrap: wrap;
      }
      .btn {
        width: 100%;
      }
      .item {
        transform: scale(0.9);
      }
    }

    @media (max-width: 520px) {
      .hud {
        grid-template-columns: 1fr;
      }
      .game-area {
        height: min(52vh, 400px);
      }
      .top-left-panel {
        position: absolute;
        top: 6px;
        left: 6px;
        width: min(220px, calc(100vw - 12px));
      }
      .info-card {
        padding: 8px 10px;
      }
      .info-card h3 {
        font-size: 14px;
        margin-bottom: 4px;
      }
      .info-card p,
      .info-card .mini {
        font-size: 11px;
        line-height: 1.35;
      }
      .character {
        width: 62px;
        height: 84px;
        left: 12%;
      }
      .lane-mark {
        left: 34%;
        width: 78px;
      }
      .item {
        min-width: 64px;
        padding: 8px 10px;
        font-size: 18px;
      }
      .item-name {
        font-size: 12px;
      }
    }

  
    @media (max-width: 820px) {
      .game-shell {
        overflow: visible;
      }
      .game-area {
        height: min(48vh, 340px);
      }
      .top-left-panel {
        position: static !important;
        width: 100% !important;
        max-width: 100% !important;
        margin: 10px 0 0 0;
        z-index: 1;
      }
      .top-left-panel .info-card {
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      }
    }

    @media (max-width: 520px) {
      .game-area {
        height: min(42vh, 300px);
      }
      .top-left-panel {
        margin-top: 8px;
      }
    }


    @media (max-width: 820px) {
      .debug-box {
        right: 8px !important;
        bottom: 8px !important;
        top: auto !important;
        font-size: 11px !important;
        padding: 8px 10px !important;
        max-width: 110px;
      }
    }

</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="hero-card">
      <div class="hero-title">♻️ 垃圾分類小英雄</div>
      <div class="hero-sub">國小友善宣導版｜40秒挑戰｜命中10次達標即可參加 LINE 抽獎</div>
    </div>
    <div class="score-wrap">
      <div>⏱ <span id="timeText">40</span> 秒</div>
      <div>⭐ <span id="scoreText">0</span> 分</div>
    </div>
  </div>

  <div class="game" id="gameArea">
    <div class="sky"></div>
    <div class="sun"></div>

    <div class="mission-card">
      <div>
        <small>🎯 任務目標</small>
        <b id="missionText">請開始遊戲</b>
      </div>
      <div class="mission-tip" id="hintText">看到正確物品再按「出手！」</div>
    </div>

    <div class="info-card">
      <div class="info-head">📘 📘 分類提示</div>
      <div class="tag" id="infoTag">尚未命中任何物品</div>
      <div class="item-name" id="infoName">準備開始</div>
      <div class="item-desc" id="infoDesc">遊戲開始後，會顯示你擊中的物品與分類方式。</div>
      <div class="item-note" id="infoNote">小提醒：只打目標，別亂出手！</div>
    </div>

    <div class="zone-label">出手！區</div>
    <div class="hit-zone"></div>
    <div class="grass"></div>
    <div class="ground"></div>

    <div class="hero" id="hero">
      <div class="head"></div>
      <div class="helmet"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="tool">🦯</div>
      <div class="body"><div class="logo">♻️</div></div>
      <div class="legs"><div class="leg"></div><div class="leg"></div></div>
    </div>

    <div class="debug" id="debugBox">題庫 0<br>場上 0<br>目標 -</div>

    <div class="overlay" id="startOverlay">
      <div class="card">
        <h1>🌱 分類任務開始前</h1>
        <p>每回合會指定一種目標：<b>一般垃圾、資源回收、廚餘</b>。</p>
        <p>物品會沿著地面從右往左前進。當它進入中間的 <b>出手！區</b>，如果符合目標，就按下 <b>💥 出手！</b>！</p>
        <p>每個正確物品 <b>+10 分</b>，40 秒內達到 <b>100 分</b> 就能參加抽獎 🎉</p>
        <button id="startBtn" style="background:linear-gradient(135deg,#2aba65,#1f9d55); box-shadow:0 16px 26px rgba(31,157,85,.25);">開始遊戲</button>
      </div>
    </div>

    <div class="overlay hidden" id="resultOverlay">
      <div class="card">
        <h2 id="resultTitle">遊戲結束</h2>
        <p id="resultDesc"></p>
        <img id="qrImage" class="qr hidden" alt="LINE QR Code" />
        <div id="resultLinks"></div>
        <button id="restartBtn" style="background:linear-gradient(135deg,#3d93ff,#2563eb); box-shadow:0 16px 26px rgba(37,99,235,.25); margin-top:12px;">再挑戰一次</button>
      </div>
    </div>
  </div>

  <div class="controls" id="controlsArea">
    <button id="hitBtn">💥 出手！</button>
  </div>
</div>

<script>
const GAME_CONFIG = {
  lineJoinUrl: "https://line.me/R/ti/p/@YOUR_LINE_ID",
  lineDrawUrl: "https://line.me/R/ti/p/@YOUR_LINE_ID",
  duration: 40,
  passScore: 100,
  spawnEveryMs: 1050,
  moveSpeed: 3.15,

function rand(arr) {
  return arr[Math.floor(Math.random()*arr.length)];
}

function pickTargetType() {
  return rand(["一般垃圾","資源回收","廚餘"]);
}

}

function getItemAdvice(item) {
  const type = item?.type || "";
  const name = item?.name || "尚未出手！";
  const category = item?.category ? `（${item.category}）` : "";
  const rawDesc = (item?.desc || "").trim();
  const rawNote = (item?.note || "").trim();

  if (rawDesc) {
    return {
      tag:
        type === "資源回收" ? "♻️ 資源回收" :
        type === "廚餘" ? "🍌 廚餘" :
        "🗑️ 一般垃圾",
      desc: `「${name}」${category}：${rawDesc}`,
      note: rawNote || `這個物品的分類是「${type}」。`
    };
  }

  if (type === "資源回收") {
    return {
      tag: "♻️ 資源回收",
      desc: `「${name}」${category}屬於資源回收。建議先清空內容物，再交給清潔隊資源回收或回收點。`,
      note: "回收前先確認沒有殘留內容物，會更容易分類。"
    };
  }
  if (type === "廚餘") {
    return {
      tag: "🍌 廚餘",
      desc: `「${name}」${category}屬於廚餘。建議先去除包裝並瀝乾水分後回收。`,
      note: "廚餘不要連同塑膠袋或餐盒一起丟入。"
    };
  }
  return {
    tag: "🗑️ 一般垃圾",
    desc: `「${name}」${category}屬於一般垃圾。請妥善裝袋後交給垃圾車。`,
    note: "若仍可使用，也可以先考慮清潔後再利用。"
  };
}

function setInfoPanel(item, wasCorrect = true) {
  if (!item) {
    infoTag.textContent = "尚未命中任何物品";
    infoName.textContent = "準備開始";
    infoDesc.textContent = "遊戲開始後，會顯示你擊中的物品與分類方式。";
    infoNote.textContent = "小提醒：只打目標，別亂出手！";
    return;
  }
  const advice = getItemAdvice(item);
  infoTag.textContent = advice.tag + (wasCorrect ? "｜答對" : "｜這題其實要跳過");
  infoName.textContent = item.name;
  infoDesc.textContent = advice.desc;
  infoNote.textContent = wasCorrect
    ? `這個物品的正確分類是「${item.type}」。`
    : `你這次打到的是「${item.name}」，但本回合目標其實是「${state.targetType}」。`;
}

function resetGame() {
  state.running = false;
  state.score = 0;
  state.timeLeft = GAME_CONFIG.duration;
  state.targetType = pickTargetType();
  state.items.forEach(i => i.el.remove());
  state.items = [];
  state.lastHit = null;
  scoreText.textContent = "0";
  timeText.textContent = String(GAME_CONFIG.duration);
  missionText.textContent = `鎖定：${state.targetType}`;
  hintText.textContent = "看到正確物品再按「出手！」";
  setInfoPanel(null);
  updateDebug();
}

function startGame() {
  resetGame();
  startOverlay.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  state.running = true;
  state.lastTs = 0;
  spawnItem();
  state.spawnId = setInterval(() => {
    if (state.running && state.items.length < GAME_CONFIG.maxItems) spawnItem();
  }, GAME_CONFIG.spawnEveryMs);

  state.timerId = setInterval(() => {
    if (!state.running) return;
    state.timeLeft -= 1;
    timeText.textContent = String(Math.max(0, state.timeLeft));
    if (state.timeLeft <= 0) endGame();
  }, 1000);

  state.rafId = requestAnimationFrame(loop);
}

function spawnItem() {
  const source = rand(QUESTION_BANK);
  const meta = CATEGORY_META[source.type] || CATEGORY_META["一般垃圾"];
  const el = document.createElement("div");
  el.className = "item";
  el.innerHTML = `<div class="emoji">${rand(meta.emojiSet)}</div><div class="name">${source.name}</div>`;
  gameArea.appendChild(el);
  const x = gameArea.clientWidth + 20 + Math.random()*60;
  const item = {
    el,
    x,
    width: 92,
    name: source.name,
    type: source.type
  };
  el.style.left = `${x}px`;
  state.items.push(item);
  updateDebug();
}

function loop(ts) {
  if (!state.running) return;
  if (!state.lastTs) state.lastTs = ts;
  const dt = Math.min(34, ts - state.lastTs);
  state.lastTs = ts;

  const zoneCenter = gameArea.clientWidth / 2;
  state.items.forEach(item => {
    item.x -= GAME_CONFIG.moveSpeed * (dt/16.7);
    item.el.style.left = `${item.x}px`;

    const itemCenter = item.x + (item.el.offsetWidth || 92)/2;
    const inZone = Math.abs(itemCenter - zoneCenter) < 62;
    item.el.classList.toggle("good", inZone && item.type === state.targetType);
    item.el.classList.toggle("bad", inZone && item.type !== state.targetType);
  });

  state.items = state.items.filter(item => {
    if (item.x < -140) {
      item.el.remove();
      return false;
    }
    return true;
  });
  updateDebug();
  state.rafId = requestAnimationFrame(loop);
}

function showFx(text, x, y, color) {
  const fx = document.createElement("div");
  fx.className = "fx";
  fx.textContent = text;
  fx.style.left = `${x}px`;
  fx.style.top = `${y}px`;
  fx.style.color = color;
  gameArea.appendChild(fx);
  setTimeout(() => fx.remove(), 760);
}

function hit() {
  if (!state.running) return;
  hero.classList.remove("attack");
  void hero.offsetWidth;
  hero.classList.add("attack");

  const zoneCenter = gameArea.clientWidth / 2;
  let target = null;
  let bestDist = Infinity;

  state.items.forEach(item => {
    const itemCenter = item.x + (item.el.offsetWidth || 92)/2;
    const dist = Math.abs(itemCenter - zoneCenter);
    if (dist < 70 && dist < bestDist) {
      bestDist = dist;
      target = item;
    }
  });

  if (!target) {
    showFx("MISS", zoneCenter, gameArea.clientHeight - 220, "#ef4444");
    infoTag.textContent = "⚠️ 沒有擊中物品";
    infoName.textContent = "請等物品進入出手！區";
    infoDesc.textContent = "看到物品進入中間虛線區，再按下出手！，就比較容易成功喔。";
    infoNote.textContent = "小提醒：綠框代表這個物品符合本回合目標。";
    return;
  }

  const correct = target.type === state.targetType;
  setInfoPanel(target, correct);

  if (correct) {
    state.score += 10;
    scoreText.textContent = String(state.score);
    showFx("+10", target.x + 46, gameArea.clientHeight - 210, "#1f9d55");
  } else {
    showFx("這題要跳過", target.x + 46, gameArea.clientHeight - 210, "#ef4444");
  }

  target.el.remove();
  state.items = state.items.filter(i => i !== target);
  updateDebug();
}

function endGame() {
  state.running = false;
  clearInterval(state.timerId);
  clearInterval(state.spawnId);
  cancelAnimationFrame(state.rafId);
  resultOverlay.classList.remove("hidden");

  const passed = state.score >= GAME_CONFIG.passScore;
  if (passed) {
    resultTitle.textContent = "🎉 恭喜達標！";
    resultDesc.innerHTML = `你得到 <b>${state.score} 分</b>，已達到抽獎資格！<br>掃描 QR Code 或點按鈕加入 LINE 好友並參加抽獎。`;
    const qrTarget = encodeURIComponent(GAME_CONFIG.lineDrawUrl || GAME_CONFIG.lineJoinUrl);
    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${qrTarget}`;
    qrImage.classList.remove("hidden");
    resultLinks.innerHTML = `
      <a class="big-btn" href="${GAME_CONFIG.lineJoinUrl}" target="_blank" rel="noopener">加入 LINE 好友</a><br>
      <a class="sec-btn" href="${GAME_CONFIG.lineDrawUrl}" target="_blank" rel="noopener">前往抽獎頁</a>
    `;
  } else {
    resultTitle.textContent = "💪 再試一次！";
    resultDesc.innerHTML = `你這次得到 <b>${state.score} 分</b>。<br>達到 <b>${GAME_CONFIG.passScore} 分</b> 就能參加抽獎喔！`;
    qrImage.classList.add("hidden");
    resultLinks.innerHTML = "";
  }
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("restartBtn").addEventListener("click", startGame);
document.getElementById("hitBtn").addEventListener("click", hit);

window.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") {
    e.preventDefault();
    hit();
  }
});

gameArea.addEventListener("touchend", (e) => {
  if (!state.running) return;
  const target = e.target;
  if (!target.closest || !target.closest('.controls')) {
    hit();
  }
}, {passive:true});

resetGame();
</script>
</body>
</html>
